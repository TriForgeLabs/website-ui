<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TriForgeLabs</title>
    <!-- Google Fonts: Rajdhani -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<header>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#about">
                Tri<span class="highlight">Forge</span>Labs
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/privacy.html">Privacy</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#data">Data Policy</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/tos.html">Terms of Service</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="navbar-underline"></div>
</header>

<body>
    <!-- About Section -->
    <section id="about" class="hero-section d-flex">
        <div class="container">
            <div class="row mt-5 align-items-center">
                <div class="col-lg-7 col-md-12">
                    <h1 class="display-4 fw-bold hero-title">
                        We Forge <span class="highlight">Apps</span> That<br>
                        Power Your <span class="highlight">Future</span>
                    </h1>
                    <p class="lead hero-subtitle mt-4">
                        <span class="fw-bold">Tri<span class="highlight">Forge</span>Labs</span>
                        is where bold ideas are forged into digital solutions that inspire, empower, and make a
                        difference.
                    </p>
                </div>
                <div class="col-lg-5 col-md-12 d-lg-flex justify-content-end">
                    <img src="assets/triforge.svg" alt="TriForgeLabs Logo" class="hero-svg"
                        style="max-width: 90%; height: auto;">
                </div>
            </div>
        </div>
    </section>

        <section id="data" class="privacy-policy-section py-5">
        </section>

        <!-- Bootstrap JS (Bundle includes Popper) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Place this before your closing </body> tag -->
        <script>
            // Wait until the DOM is fully loaded before running the script
            document.addEventListener("DOMContentLoaded", function () {
                // Select all sections that have an id attribute (e.g., <section id="about">)
                const sections = document.querySelectorAll("section[id]");
                // Select all navigation links with the class 'nav-link'
                const navLinks = document.querySelectorAll(".nav-link");

                // This function will be called whenever the user scrolls
                function onScroll() {
                    // Get the current vertical scroll position, plus an offset for the sticky navbar height
                    let scrollPos = window.scrollY + 100; // Adjust 100 if your navbar height is different

                    // Loop through each section to determine which one is currently in view
                    sections.forEach(section => {
                        // Check if the current scroll position is within this section's vertical bounds
                        if (
                            scrollPos >= section.offsetTop &&
                            scrollPos < section.offsetTop + section.offsetHeight
                        ) {
                            // If so, loop through all nav links
                            navLinks.forEach(link => {
                                // Remove the 'active' class from all links
                                link.classList.remove("active");
                                // If the link's href matches the current section's id, add 'active'
                                if (link.getAttribute("href") === "#" + section.id) {
                                    link.classList.add("active");
                                }
                            });
                        }
                    });
                }

                // Listen for scroll events and call onScroll each time the user scrolls
                window.addEventListener("scroll", onScroll);
                // Call onScroll once on page load to set the correct active link
                onScroll();
            });
        </script>
    </section>
</body>

</html>
